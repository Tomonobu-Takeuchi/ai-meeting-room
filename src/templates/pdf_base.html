<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
@page {
  size: A4;
  margin: 18mm 18mm 18mm 18mm;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans CJK JP", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
  font-size: 11pt;
  line-height: 1.7;
  color: #E6EDF3;
  background: #0D1117;
}
.page-break { page-break-before: always; }
h1.report-title {
  font-size: 18pt;
  font-weight: 700;
  color: #E6EDF3;
  margin-bottom: 4pt;
}
.report-meta {
  font-size: 9pt;
  color: #8B949E;
  margin-bottom: 6pt;
}
.divider {
  border: none;
  border-top: 1px solid #2563EB;
  margin: 8pt 0 12pt 0;
}
.divider-thin {
  border: none;
  border-top: 0.5px solid #30363D;
  margin: 8pt 0;
}
.section-title {
  font-size: 12pt;
  font-weight: 700;
  color: #E6EDF3;
  margin: 10pt 0 6pt 0;
}
.card {
  background: #1C2333;
  border: 0.5px solid #30363D;
  border-radius: 6pt;
  padding: 10pt 12pt;
  margin-bottom: 8pt;
}
.card-label {
  font-size: 9pt;
  font-weight: 700;
  margin-bottom: 5pt;
}
.text-secondary { color: #8B949E; }
.text-blue { color: #2563EB; }
.text-purple { color: #7C3AED; }
.text-green { color: #16A34A; }
.text-red { color: #DC2626; }
.text-orange { color: #D97706; }
.accent-left-blue {
  border-left: 3pt solid #2563EB;
  padding: 8pt 12pt;
  background: rgba(37,99,235,0.08);
  border-radius: 0 6pt 6pt 0;
  margin-bottom: 8pt;
}
.accent-left-purple {
  border-left: 3pt solid #7C3AED;
  padding: 8pt 12pt;
  background: rgba(124,58,237,0.08);
  border-radius: 0 6pt 6pt 0;
  margin-bottom: 8pt;
}
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8pt;
  margin-bottom: 10pt;
}
.badge {
  display: inline-block;
  font-size: 8pt;
  padding: 1pt 6pt;
  border-radius: 4pt;
  font-weight: 600;
}
.badge-purple { background: rgba(124,58,237,0.2); color: #A78BFA; }
.badge-red { background: rgba(220,38,38,0.15); color: #F87171; }
.action-row {
  display: flex;
  gap: 8pt;
  align-items: flex-start;
  padding: 6pt 0;
  border-bottom: 0.5px solid #21262D;
}
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
