name: DB Backup (Cloud / 2nd line)

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 21:00 JST daily
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client and 7zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates p7zip-full
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump database (custom format)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" \
            -Fc --no-owner --no-privileges \
            -f "prod_backup_${STAMP}.dump"
          ls -l --block-size=K prod_backup_${STAMP}.dump

      - name: Encrypt with AES-256
        env:
          ARCHIVE_PASSWORD: ${{ secrets.BACKUP_ARCHIVE_PASSWORD }}
        run: |
          7z a -t7z -mhe=on -p"$ARCHIVE_PASSWORD" \
            "prod_backup_${STAMP}.7z" "prod_backup_${STAMP}.dump"
          rm -f "prod_backup_${STAMP}.dump"

      - name: Upload artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.STAMP }}
          path: prod_backup_${{ env.STAMP }}.7z
          retention-days: 30
          if-no-files-found: error

      - name: Ping healthchecks.io (success)
        if: success()
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECKS_PING_URL_GHA }}" > /dev/null

      - name: Ping healthchecks.io (failure)
        if: failure()
        run: curl -fsS -m 10 --retry 3 "${{ secrets.HEALTHCHECKS_PING_URL_GHA }}/fail" > /dev/null || true
